actions:
  - id: move
    name: Move
    category: movement
    description: "Move up to 2 tiles"
    cost:
      time: 1
    parameters:
      - key: target
        type: tile
        range: 2
    effects:
      - id: move-1
        type: move
        params:
          target: $target

  - id: run
    name: Run
    category: movement
    description: "Run up to 6 tiles"
    cost:
      time: 2
    parameters:
      - key: target
        type: tile
        range: 6
    effects:
      - id: run-1
        type: move
        params:
          target: $target

  - id: attack
    name: Attack
    category: attack
    description: "Attack an adjacent enemy"
    cost:
      time: 2
    parameters: []
    effects:
      - id: attack-1
        type: attack
        params:
          targetEntity: monster
          damage: 1
    options:
      quickStrike:
        cost:
          green: 1
        alternativeCost:
          windup: 1
        condition:
          weaponTag: light
        costModifier:
          time: -1
        modifies: attack-1
        modifier:
          quickStrike: true

  - id: rest
    name: Rest
    category: other
    description: "Draw 2 beads to your hand"
    cost:
      time: 2
    parameters: []
    effects:
      - id: rest-1
        type: drawBeads
        params:
          count: 2
    options:
      strategize:
        cost:
          blue: 1
        alternativeCost:
          ponder: 1
        modifies: rest-1
        modifier:
          strategize: true

  - id: coordinate
    name: Coordinate
    category: other
    description: "Grant an ally a preparation stack"
    cost:
      time: 1
      white: 1
    parameters:
      - key: target
        type: entity
        range: 6
    effects:
      - id: coordinate-1
        type: coordinate
        params:
          targetEntity: $target

  - id: assess
    name: Assess
    category: other
    description: "Reveal a monster's next planned action"
    cost:
      time: 1
      blue: 1
    parameters:
      - key: target
        type: entity
        range: 6
    effects:
      - id: assess-1
        type: assess
        params:
          targetEntity: $target
