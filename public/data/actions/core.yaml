actions:
  - id: move
    name: Move
    category: movement
    description: Move up to 2 tiles
    cost:
      time: 1
    parameters:
      - key: target
        type: tile
        prompt: Select destination
        range: 2
        filter: empty
    effects:
      - id: movement
        type: move
        params:
          destination: $target

  - id: run
    name: Run
    category: movement
    description: Move up to 6 tiles
    cost:
      time: 2
    parameters:
      - key: target
        type: tile
        prompt: Select destination
        range: 6
        filter: empty
    effects:
      - id: movement
        type: move
        params:
          destination: $target

  - id: attack
    name: Attack
    category: attack
    description: Attack an adjacent enemy
    cost:
      time: 2
    parameters: []
    effects:
      - id: baseAttack
        type: attack
        params:
          targetEntity: monster
          power: 3
          agility: 3

  - id: rest
    name: Rest
    category: other
    description: Draw 2 beads to hand
    cost:
      time: 2
    parameters: []
    effects:
      - id: drawBeads
        type: drawBeads
        params:
          entityId: hero-0
          count: 2

  - id: feint_attack
    name: Feint Attack
    category: attack
    description: A deceptive strike that bypasses guard
    cost:
      time: 2
      blue: 1
    parameters:
      - key: target
        type: entity
        prompt: Select target
        filter: enemy
        range: 1
    effects:
      - id: feintStrike
        type: attack
        params:
          targetEntity: $target
          power: 1
          agility: 2
          modifiers:
            - feint

  - id: heavy_strike
    name: Heavy Strike
    category: attack
    description: A crushing blow that pierces armor
    cost:
      time: 3
      red: 2
    parameters:
      - key: target
        type: entity
        prompt: Select target
        filter: enemy
        range: 1
    effects:
      - id: heavyBlow
        type: attack
        params:
          targetEntity: $target
          power: 3
          agility: 1
          modifiers:
            - heavy

  - id: precise_strike
    name: Precise Strike
    category: attack
    description: A carefully aimed attack that rarely misses
    cost:
      time: 2
      green: 1
    parameters:
      - key: target
        type: entity
        prompt: Select target
        filter: enemy
        range: 1
    effects:
      - id: preciseHit
        type: attack
        params:
          targetEntity: $target
          power: 1
          agility: 3
          modifiers:
            - precise

  - id: power_attack
    name: Power Attack
    category: attack
    description: A powerful attack with enhancement options
    cost:
      time: 2
      red: 1
    parameters:
      - key: target
        type: entity
        prompt: Select target
        filter: enemy
        range: 1
      - key: enhancements
        type: option
        prompt: Enhance your attack?
        optional: true
        multiSelect: true
        options:
          - id: extra_damage
            label: "+1 Damage"
            cost:
              red: 1
          - id: knockback
            label: "Knockback"
            cost:
              green: 1
    effects:
      - id: baseAttack
        type: attack
        params:
          targetEntity: $target
          power: 2
          agility: 1
    options:
      extra_damage:
        modifies: baseAttack
        modifier:
          power: +1
      knockback:
        adds:
          - id: knockbackEffect
            type: push
            params:
              targetEntity: $target
              distance: 1
              condition: $baseAttack.hit
