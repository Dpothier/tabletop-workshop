# Weapon-specific actions granted by equipment
# Registered in ActionRegistry alongside core actions
actions:
  - id: guard-stance
    name: Guard Stance
    category: defense
    description: Adopt a defensive guard position
    cost:
      time: 1
    parameters: []
    effects:
      - id: guard-1
        type: modifyStat
        params:
          stat: guard
          value: 1
  - id: sanctuary
    name: Sanctuary
    category: spell
    description: Create a barrier zone that pushes enemies away and prevents entry
    cost:
      time: 2
      beads:
        white: 1
    parameters:
      - name: size
        type: select
        options: [3]
    effects:
      - id: sanctuary-1
        type: sanctuary
        params:
          size: "{size}"
    enhancements:
      - id: zone-5x5
        name: Zone 5x5
        cost:
          beads:
            white: 1
        effect:
          size: 5
      - id: zone-7x7
        name: Zone 7x7
        cost:
          beads:
            white: 1
        requires: zone-5x5
        effect:
          size: 7
  - id: warp
    name: Warp
    category: spell
    description: Teleport yourself or others to a distant location
    cost:
      time: 2
      beads:
        blue: 1
    parameters:
      - name: destination
        type: position
        range: 6
    effects:
      - id: warp-1
        type: warp
        params: {}
    enhancements:
      - id: swap
        name: Swap
        cost:
          beads:
            blue: 1
        effect:
          swap: true
      - id: other
        name: Other
        cost:
          beads:
            blue: 1
        effect:
          other: true
      - id: extended-selection
        name: Extended Selection
        cost:
          beads:
            blue: 1
        requires: other
        effect:
          extendedSelection: true
      - id: extended-range
        name: Extended Range
        cost:
          beads:
            blue: 1
        effect:
          extendedRange: true
  - id: phoenix_rebirth
    name: Phoenix Rebirth
    category: spell
    description: Stabilize an ally and trigger a fire burst around them
    cost:
      time: 2
      beads:
        white: 1
    parameters:
      - name: target
        type: entity
        range: 1
    effects:
      - id: phoenix-stabilize-1
        type: stabilize
        params: {}
      - id: phoenix-burst-1
        type: phoenixBurst
        params: {}
    enhancements:
      - id: phoenix-burst
        name: Phoenix Burst
        cost:
          beads:
            white: 1
        effect:
          burst: true
      - id: ignite
        name: Ignite
        cost:
          beads:
            white: 1
        requires: phoenix-burst
        effect:
          ignite: true
      - id: range
        name: Range
        cost:
          beads:
            white: 1
        effect:
          range: true
  - id: temporal_shift
    name: Temporal Shift
    category: spell
    description: Advance or delay targets on the action wheel
    cost:
      time: 2
      beads:
        blue: 1
    parameters:
      - name: target
        type: entity
        range: 1
      - name: direction
        type: select
        options: [advance, delay]
    effects:
      - id: temporal-shift-1
        type: temporalShift
        params: {}
    enhancements:
      - id: aoe-3x3
        name: AoE 3x3
        cost:
          beads:
            blue: 1
        effect:
          aoe3x3: true
      - id: aoe-5x5
        name: AoE 5x5
        cost:
          beads:
            blue: 1
        effect:
          aoe5x5: true
      - id: intensity
        name: Intensity
        cost:
          beads:
            blue: 1
        effect:
          intensity: true
