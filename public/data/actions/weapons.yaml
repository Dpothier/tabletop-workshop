# Weapon-specific actions granted by equipment
# Registered in ActionRegistry alongside core actions
actions:
  - id: guard-stance
    name: Guard Stance
    category: defense
    description: Adopt a defensive guard position
    cost:
      time: 1
    parameters: []
    effects:
      - id: guard-1
        type: modifyStat
        params:
          stat: guard
          value: 1
  - id: sanctuary
    name: Sanctuary
    category: spell
    description: Create a barrier zone that pushes enemies away and prevents entry
    cost:
      time: 2
      beads:
        white: 1
    parameters:
      - name: size
        type: select
        options: [3]
    effects:
      - id: sanctuary-1
        type: sanctuary
        params:
          size: "{size}"
    enhancements:
      - id: zone-5x5
        name: Zone 5x5
        cost:
          beads:
            white: 1
        effect:
          size: 5
      - id: zone-7x7
        name: Zone 7x7
        cost:
          beads:
            white: 1
        requires: zone-5x5
        effect:
          size: 7
  - id: warp
    name: Warp
    category: spell
    description: Teleport yourself or others to a distant location
    cost:
      time: 2
      beads:
        blue: 1
    parameters:
      - name: destination
        type: position
        range: 6
    effects:
      - id: warp-1
        type: warp
        params: {}
    enhancements:
      - id: swap
        name: Swap
        cost:
          beads:
            blue: 1
        effect:
          swap: true
      - id: other
        name: Other
        cost:
          beads:
            blue: 1
        effect:
          other: true
      - id: extended-selection
        name: Extended Selection
        cost:
          beads:
            blue: 1
        requires: other
        effect:
          extendedSelection: true
      - id: extended-range
        name: Extended Range
        cost:
          beads:
            blue: 1
        effect:
          extendedRange: true
  - id: phoenix_rebirth
    name: Phoenix Rebirth
    category: spell
    description: Stabilize an ally and trigger a fire burst around them
    cost:
      time: 2
      beads:
        white: 1
    parameters:
      - name: target
        type: entity
        range: 1
    effects:
      - id: phoenix-stabilize-1
        type: stabilize
        params: {}
      - id: phoenix-burst-1
        type: phoenixBurst
        params: {}
    enhancements:
      - id: phoenix-burst
        name: Phoenix Burst
        cost:
          beads:
            white: 1
        effect:
          burst: true
      - id: ignite
        name: Ignite
        cost:
          beads:
            white: 1
        requires: phoenix-burst
        effect:
          ignite: true
      - id: range
        name: Range
        cost:
          beads:
            white: 1
        effect:
          range: true
  - id: temporal_shift
    name: Temporal Shift
    category: spell
    description: Advance or delay targets on the action wheel
    cost:
      time: 2
      beads:
        blue: 1
    parameters:
      - name: target
        type: entity
        range: 1
      - name: direction
        type: select
        options: [advance, delay]
    effects:
      - id: temporal-shift-1
        type: temporalShift
        params: {}
    enhancements:
      - id: aoe-3x3
        name: AoE 3x3
        cost:
          beads:
            blue: 1
        effect:
          aoe3x3: true
      - id: aoe-5x5
        name: AoE 5x5
        cost:
          beads:
            blue: 1
        effect:
          aoe5x5: true
      - id: intensity
        name: Intensity
        cost:
          beads:
            blue: 1
        effect:
          intensity: true
  - id: bless
    name: Bless
    category: other
    description: Grant a gold bead to an ally within range
    cost:
      time: 1
      beads:
        white: 1
    parameters:
      - name: target
        type: entity
        range: 6
    effects:
      - id: bless-1
        type: bless
        params: {}
  - id: renew
    name: Renew
    category: reaction
    description: When an ally resolves Rest, they draw 1 extra bead
    cost:
      beads:
        white: 1
    parameters:
      - name: target
        type: entity
        range: 6
    effects:
      - id: renew-1
        type: renew
        params: {}
  - id: overwrite
    name: Overwrite
    category: reaction
    description: Cancel a monster's bead draw and force a redraw
    cost:
      time: 0
      beads:
        blue: 3
    parameters:
      - name: target
        type: entity
        selection:
          type: enemy
          range: 6
    effects:
      - id: overwrite-effect
        type: overwrite
        params: {}
  - id: command
    name: Command
    category: other
    description: Share a bead from bearer's hand with an ally in range
    cost:
      time: 0
    parameters:
      - name: target
        type: entity
        selection:
          type: ally
          range: 6
    effects:
      - id: command-effect
        type: command
        params: {}
  - id: rally
    name: Rally
    category: reaction
    description: Preserve ally's preparation stacks when they would be interrupted
    cost:
      time: 0
      beads:
        white: 1
    parameters:
      - name: target
        type: entity
        selection:
          type: ally
          range: 6
    effects:
      - id: rally-effect
        type: rally
        params: {}
  - id: inspire
    name: Inspire
    category: reaction
    description: Grant +1 Guard to an ally when they are attacked
    cost:
      time: 0
      beads:
        white: 1
    parameters:
      - name: target
        type: entity
        selection:
          type: ally
          range: 6
    effects:
      - id: inspire-effect
        type: inspire
        params: {}
  - id: greatGuard
    name: Great Guard
    category: reaction
    description: Add +1 Guard to bearer when attacked
    cost:
      time: 0
      beads:
        red: 1
    parameters:
      - name: target
        type: entity
        selection:
          type: self
    effects:
      - id: great-guard-effect
        type: greatGuard
        params: {}
  - id: shieldWall
    name: Shield Wall
    category: reaction
    description: Grant +1 Guard to an adjacent ally when they are attacked
    cost:
      time: 0
      beads:
        red: 1
    parameters:
      - name: target
        type: entity
        selection:
          type: ally
          range: 1
    effects:
      - id: shield-wall-effect
        type: shieldWall
        params: {}
  - id: rebuke
    name: Rebuke
    category: reaction
    description: Push attacker back after a successful block
    cost:
      time: 0
      beads:
        red: 1
    parameters:
      - name: target
        type: entity
        selection:
          type: enemy
          range: 1
    effects:
      - id: rebuke-effect
        type: rebuke
        params: {}
  - id: riposte
    name: Riposte
    category: reaction
    description: Counter-attack after a successful block, dealing 1 damage
    cost:
      time: 0
      beads:
        green: 1
    parameters:
      - name: target
        type: entity
        selection:
          type: enemy
          range: 1
    effects:
      - id: riposte-effect
        type: riposte
        params: {}
  - id: block
    name: Block
    category: reaction
    description: Shield reaction granting +1 Guard against the current attack
    cost:
      time: 0
      beads:
        anyColor: 1
    parameters:
      - name: target
        type: entity
        selection:
          type: self
    effects:
      - id: block-effect
        type: block
        params: {}
  - id: reload_arquebus
    name: Reload Arquebus
    category: other
    description: Reload the arquebus for the next shot
    cost:
      time: 2
    parameters: []
    effects:
      - id: reload-arquebus-effect
        type: load
        params:
          weaponId: arquebus
  - id: reload_pistol
    name: Reload Pistol
    category: other
    description: Reload the pistol for the next shot
    cost:
      time: 2
    parameters: []
    effects:
      - id: reload-pistol-effect
        type: load
        params:
          weaponId: pistol
  - id: load_crossbow
    name: Load Crossbow
    category: other
    description: Load the crossbow for the next shot
    cost:
      time: 1
    parameters: []
    effects:
      - id: load-crossbow-effect
        type: load
        params:
          weaponId: crossbow
  - id: steadyAim
    name: Steady Aim
    category: modifier
    description: Take careful aim for increased precision
    cost:
      time: 0
      beads:
        blue: 1
    condition:
      weaponTag: firearm
    modifier:
      agility: 1
    parameters: []
    effects: []
