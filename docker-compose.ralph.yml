services:
  ralph:
    build:
      context: .
      dockerfile: Dockerfile.ralph

    # Run as host user so mounted file permissions (credentials, workspace) work
    user: "${HOST_UID:-1000}:${HOST_GID:-1000}"

    # Non-interactive stdin/tty for automated execution
    stdin_open: true
    tty: false

    # Environment variables
    environment:
      # Auth option 1: API key (set ANTHROPIC_API_KEY in your shell)
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}

      # Auth option 2: OAuth token from Max/Pro subscription
      CLAUDE_CODE_OAUTH_TOKEN: ${CLAUDE_CODE_OAUTH_TOKEN:-}

      # JIRA integration (optional)
      JIRA_BASE_URL: ${JIRA_BASE_URL:-}
      JIRA_EMAIL: ${JIRA_EMAIL:-}
      JIRA_API_TOKEN: ${JIRA_API_TOKEN:-}
      JIRA_PROJECT_KEY: ${JIRA_PROJECT_KEY:-}

      # Ralph configuration
      PROJECT_ROOT: /workspace
      RALPH_MODE: "true"
      HOME: /home/ralph

    # Load .env.ralph for JIRA credentials (optional, ignored if missing)
    env_file:
      - path: .env.ralph
        required: false

    # Volumes for persistence
    volumes:
      # Persist claude-mem data
      - ${REAL_HOME:?Set REAL_HOME}/.claude-mem:/home/ralph/.claude-mem

      # Claude Code credentials and state from host (rw for token refresh)
      - ${REAL_HOME}/.claude.json:/home/ralph/.claude.json
      - ${REAL_HOME}/.claude:/home/ralph/.claude
      - ${REAL_HOME}/.config/claude-code:/home/ralph/.config/claude-code

      # Project source (read-write for commits)
      - .:/workspace:rw

    # Network configuration
    networks:
      - ralph-network

    # Logging
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

    # Resource limits (adjust based on your system)
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G
        reservations:
          cpus: '1'
          memory: 2G

    # Example command overrides (uncomment to use):
    # command: ["--epic", "STORY-001", "--max", "10"]
    #
    # Options:
    # --epic EPIC_KEY    : Sync from JIRA epic before starting
    # --max N            : Override AFK_MAX_ITERATIONS

networks:
  ralph-network:
    driver: bridge
